<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-cc-base-deep text-cc-text-high">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:white;color:red;z-index:9999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        div.textContent = 'Error: ' + e.error?.message + '\n\n' + e.error?.stack;
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:white;color:red;z-index:9999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        div.textContent = 'Unhandled Rejection: ' + e.reason?.message + '\n\n' + e.reason?.stack;
        document.body.appendChild(div);
      });
    </script>
  </body>
</html>
